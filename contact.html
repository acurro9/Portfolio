<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,200;0,400;0,600;0,800;1,700&family=Roboto:ital,wght@1,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/contact.css" />
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/btnAnimation.css" />
    <script src="./js/jQuery.js"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <title>Contact</title>
  </head>
  <body class="contact_body" onload="checkWidth()">
    <div class="height">
      <header class="head contact_head_menu" id="head_menu">
        <div class="nav_menu">
          <a href="./index.html">
            <img src="./images/logo_blanco.png" alt="logo" class="menu_logo"
          /></a>
          <nav id="menuNav" class="visible">
            <ul class="menu" id="menuNav2">
              <li><a href="./index.html">Index</a></li>
              <li><a href="./aboutMe.html">About me</a></li>
              <li><a href="./projects.html">Projects</a></li>
              <li>
                <a href="./contact.html" class="active">Contact</a>
              </li>
            </ul>
          </nav>
          <button id="btnC" class="menu_btn hidden">
            <img
              src="./images/icons/close.svg"
              alt=""
              class="img_menu hidden"
              id="menuImgC"
            />
          </button>
          <button id="btnM" class="menu_btn hidden">
            <img
              src="./images/icons/menu.svg"
              alt=""
              id="menuImg"
              class="hidden img_menu"
            />
          </button>
        </div>
      </header>

      <main class="contact_main">
        <div class="contact_primary">
          <form class="contact_form">
            <fieldset>
              <legend>Contact me</legend>
              <div class="contact_data1">
                <div class="contact_data">
                  <label for="name">Name: </label>
                  <input
                    type="text"
                    placeholder="Name & surname"
                    id="contact_name"
                  />
                </div>
                <div class="contact_data">
                  <label for="email">Email: </label>
                  <input type="mail" placeholder="Mail" id="contact_mail" />
                </div>
              </div>
              <div class="contact_data2">
                <div class="contact_data">
                  <label for="tel">Telephone number: </label>
                  <input type="tlf" placeholder="684561247" id="contact_tlf" />
                </div>
                <div class="contact_data">
                  <label for="sln">Subject Line: </label>
                  <input
                    type="text"
                    placeholder="Subject"
                    id="contact_subject"
                  />
                </div>
              </div>
              <div class="contact_data3">
                <div class="contact_data">
                  <label for="msj">Message: </label>
                  <textarea
                    name="msj"
                    id="contact_msg"
                    cols="30"
                    rows="10"
                    placeholder="What's on your mind? "
                  ></textarea>
                </div>
              </div>
              <div class="contact_form_btn">
                <ul class="contact_btnAn">
                  <li>
                    <a class="contact_a">
                      <button class="contact_a_input" onclick="validation()">
                        Send It
                      </button>
                      <span class="border border-top"></span>
                      <span class="border border-right"></span>
                      <span class="border border-bottom"></span>
                      <span class="border border-left"></span>
                    </a>
                  </li>
                </ul>
                <ul class="contact_btnAn">
                  <li>
                    <a class="contact_a"
                      ><input
                        type="reset"
                        value="Reset"
                        class="contact_a_input"
                      />
                      <span class="border border-top"></span>
                      <span class="border border-right"></span>
                      <span class="border border-bottom"></span>
                      <span class="border border-left"></span>
                    </a>
                  </li>
                </ul>
              </div>
            </fieldset>
          </form>
        </div>
      </main>
      <footer class="footer">
        <div class="leftFooter">
          <div class="links">
            <a
              href="https://github.com/acurro9?tab=repositories"
              target="_blank"
            >
              <img src="./images/icons/github.svg" alt="" />
            </a>
            <a
              href="https://es.linkedin.com/in/aaron-curro-solla-714b73258"
              target="_blank"
            >
              <img src="./images/icons/linkedin.svg" alt="" />
            </a>
            <a href="mailto:asbarxas.aaroncurro@gmail.com" target="_blank">
              <img src="./images/icons/mail.svg" alt="" />
            </a>
            <a href="">
              <img src="./images/icons/whatsapp.svg" alt="" />
            </a>
          </div>
          <div class="copy">
            <img src="./images/icons/copyrigth.svg" alt="" />
            <p>All rigths reserved</p>
          </div>
        </div>
        <nav id="footer_menu">
          <ul class="menu">
            <li><a href="./index.html">Index</a></li>
            <li><a href="./aboutMe.html">About me</a></li>
            <li><a href="./projects.html">Projects</a></li>
            <li><a href="./contact.html">Contact</a></li>
          </ul>
        </nav>
      </footer>
    </div>
    <script src="./js/display.js"></script>
    <script src="./js/index.js"></script>
    <script src="./js/validation.js"></script>
  </body>
</html>
